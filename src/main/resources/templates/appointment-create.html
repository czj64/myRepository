<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约挂号 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f5f5f5; }
        .header { background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; padding: 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .nav a { color: white; margin-left: 5px; text-decoration: none; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .nav a.active { background: rgba(255,255,255,0.25); font-weight: bold; }
        .user-greeting { color: rgba(255,255,255,0.9); margin-right: 10px; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .content { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .back-btn { display: inline-block; padding: 8px 20px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
        .back-btn:hover { background: #ddd; }
        .appointment-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .page-title { text-align: center; margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 24px; }
        .doctor-info { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .doctor-info h3 { color: #333; margin-bottom: 10px; }
        .doctor-info p { color: #666; }
        .time-slots { margin-bottom: 20px; }
        .time-slots-label { display: block; margin-bottom: 12px; color: #333; font-weight: 500; }
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .slot-btn { padding: 12px 8px; border: 2px solid #4caf50; border-radius: 8px; background: #e8f5e9; color: #2e7d32; font-size: 14px; cursor: pointer; text-align: center; font-weight: 500; transition: all 0.2s; }
        .slot-btn:hover:not(.booked) { border-color: #388e3c; background: #c8e6c9; transform: scale(1.03); }
        .slot-btn.selected { border-color: #2E86DE; background: #2E86DE; color: white; font-weight: 700; }
        .slot-btn.booked { border-color: #ef5350; background: #ffebee; color: #c62828; cursor: not-allowed; text-decoration: line-through; font-weight: 400; }
        .slot-hint { text-align: center; color: #999; margin-top: 20px; font-size: 14px; }
        .slot-legend { display: flex; gap: 20px; margin-bottom: 12px; font-size: 13px; }
        .slot-legend span { display: flex; align-items: center; gap: 6px; }
        .legend-avail { width: 14px; height: 14px; border-radius: 3px; background: #e8f5e9; border: 2px solid #4caf50; }
        .legend-booked { width: 14px; height: 14px; border-radius: 3px; background: #ffebee; border: 2px solid #ef5350; }
        .legend-selected { width: 14px; height: 14px; border-radius: 3px; background: #2E86DE; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #2E86DE; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(46, 134, 222, 0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🏥 医院预约挂号系统</div>
            <div class="nav">
                <a href="/" class="nav-home">首页</a>
                <a href="/departments" class="nav-depts">科室导航</a>
                <a href="/appointments" class="nav-appts">我的预约</a>
                <a href="/patient/records" class="nav-records">诊疗记录</a>
                <a href="/profile" class="nav-profile">个人中心</a>
                <span class="user-greeting">👤 [[${user.name}]]</span>
                <a href="/logout">退出</a>
            </div>
        </div>
    </div>

    <div class="content">
        <a href="javascript:history.back()" class="back-btn">← 返回</a>

        <div class="appointment-card">
            <div class="page-title">
                <h1>预约挂号</h1>
            </div>

            <div class="doctor-info">
                <h3>就诊医生</h3>
                <p>[[${doctor.name}]] - [[${doctor.title}]] - [[${doctor.department.name}]]</p>
                <p>坐诊时间：[[${doctor.availableTime}]]</p>
            </div>
            <span id="availTimeText" style="display:none;">[[${doctor.availableTime}]]</span>

            <form action="/appointment/submit" method="post" id="appointmentForm">
                <input type="hidden" name="doctorId" th:value="${doctor.id}">

                <div class="form-group">
                    <label for="appointmentDate">预约日期</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" required>
                </div>

                <div class="time-slots">
                    <label class="time-slots-label">预约时间（点击选择）</label>
                    <div class="slot-legend">
                        <span><span class="legend-avail"></span> 可预约</span>
                        <span><span class="legend-booked"></span> 已约满</span>
                        <span><span class="legend-selected"></span> 已选中</span>
                    </div>
                    <div id="slotGrid" class="slot-grid">
                        <p class="slot-hint">请先选择预约日期</p>
                    </div>
                    <input type="hidden" id="appointmentTime" name="appointmentTime">
                </div>

                <div class="form-group">
                    <label for="patientName">患者姓名</label>
                    <input type="text" id="patientName" name="patientName" th:value="${user.name}" placeholder="请输入患者姓名" required>
                </div>

                <div class="form-group">
                    <label for="patientPhone">联系电话</label>
                    <input type="tel" id="patientPhone" name="patientPhone" th:value="${user.phone != null ? user.phone : ''}" placeholder="请输入11位手机号" pattern="^1[3-9]\d{9}$" title="请输入有效的11位手机号" required>
                </div>

                <div th:if="${error}" style="color: red; margin-bottom: 15px; text-align: center;">
                    <p th:text="${error}"></p>
                </div>

                <button type="submit" class="btn" id="submitBtn" disabled>请先选择时段</button>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>© 2024 医院预约挂号系统 版权所有</p>
    </div>

    <script>
        var doctorId = /*[[${doctor.id}]]*/ 0;
        var srvStart = /*[[${startTime}]]*/ '';
        var srvEnd   = /*[[${endTime}]]*/ '';

        // 星期映射
        var DAYS_CN = ['周日','周一','周二','周三','周四','周五','周六'];
        var DAYS_EN = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

        document.addEventListener('DOMContentLoaded', function() {
            if (srvStart && srvEnd) {
                window._timeStart = srvStart;
                window._timeEnd = srvEnd;
            } else {
                var el = document.getElementById('availTimeText');
                if (el) {
                    var t = el.textContent.trim();
                    var m = t.match(/(\d{1,2}):(\d{2})\s*[-~]\s*(\d{1,2}):(\d{2})/);
                    if (m) {
                        window._timeStart = m[1].padStart(2, '0') + ':' + m[2];
                        window._timeEnd   = m[3].padStart(2, '0') + ':' + m[4];
                    }
                }
            }

            var today = new Date();
            var minDate = today.getFullYear() + '-' +
                String(today.getMonth() + 1).padStart(2, '0') + '-' +
                String(today.getDate()).padStart(2, '0');
            document.getElementById('appointmentDate').setAttribute('min', minDate);

            document.getElementById('appointmentDate').addEventListener('change', loadBookedSlots);
        });

        function genSlots(startStr, endStr, interval) {
            var slots = [];
            var sp = startStr.split(':').map(Number);
            var ep = endStr.split(':').map(Number);
            var startMin = sp[0] * 60 + sp[1];
            var endMin = ep[0] * 60 + ep[1];
            for (var m = startMin; m < endMin; m += interval) {
                var h = Math.floor(m / 60);
                var min = m % 60;
                var time = String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0');
                var em = m + interval;
                var eh = Math.floor(em / 60);
                var emi = em % 60;
                var label = String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0') + '-' +
                            String(eh).padStart(2, '0') + ':' + String(emi).padStart(2, '0');
                slots.push({ time: time, label: label });
            }
            return slots;
        }

        function isDoctorAvailableOnDate(dateStr) {
            var el = document.getElementById('availTimeText');
            if (!el) return false;
            var avail = el.textContent.toLowerCase();
            var d = new Date(dateStr + 'T00:00:00');
            var dayCN = DAYS_CN[d.getDay()];   // 周一/周二/...
            var dayEN = DAYS_EN[d.getDay()];   // monday/tuesday/...
            // 每天
            if (avail.indexOf('每天')>=0 || avail.indexOf('everyday')>=0 || avail.indexOf('周一至周五')>=0 && d.getDay()>=1 && d.getDay()<=5) return true;
            if (avail.indexOf('周一至周五')>=0 || avail.indexOf('weekday')>=0 || avail.indexOf('工作日')>=0) return d.getDay()>=1 && d.getDay()<=5;
            if (avail.indexOf('周末')>=0 || avail.indexOf('weekend')>=0) return d.getDay()===0 || d.getDay()===6;
            // 单个星期
            if (avail.indexOf(dayCN)>=0 || avail.indexOf(dayEN)>=0) return true;
            // 简写
            if (dayEN==='monday' && (avail.indexOf('mon')>=0)) return true;
            if (dayEN==='tuesday' && (avail.indexOf('tue')>=0)) return true;
            if (dayEN==='wednesday' && (avail.indexOf('wed')>=0)) return true;
            if (dayEN==='thursday' && (avail.indexOf('thu')>=0)) return true;
            if (dayEN==='friday' && (avail.indexOf('fri')>=0)) return true;
            if (dayEN==='saturday' && (avail.indexOf('sat')>=0)) return true;
            if (dayEN==='sunday' && (avail.indexOf('sun')>=0)) return true;
            return false;
        }

        async function loadBookedSlots() {
            var dateVal = document.getElementById('appointmentDate').value;
            var grid = document.getElementById('slotGrid');
            var submitBtn = document.getElementById('submitBtn');
            var timeInput = document.getElementById('appointmentTime');

            if (!dateVal) {
                grid.innerHTML = '<p class="slot-hint">请先选择预约日期</p>';
                submitBtn.disabled = true;
                submitBtn.textContent = '请先选择时段';
                return;
            }

            // 检查该日期医生是否坐诊
            if (!isDoctorAvailableOnDate(dateVal)) {
                grid.innerHTML = '<p class="slot-hint" style="color:#c62828;">该日期医生不坐诊，请选择其他日期</p>';
                submitBtn.disabled = true;
                submitBtn.textContent = '请先选择时段';
                return;
            }

            if (!window._timeStart || !window._timeEnd) {
                grid.innerHTML = '<p class="slot-hint">无法解析医生坐诊时间</p>';
                return;
            }

            try {
                var bookedTimes = {};
                try {
                    var url = '/appointment/booked-slots?doctorId=' + doctorId + '&date=' + dateVal;
                    var resp = await fetch(url);
                    if (resp.ok) {
                        var bookedData = await resp.json();
                        console.log('booked-slots response:', JSON.stringify(bookedData));
                        bookedData.forEach(function(b) {
                            var t = String(b.time).substring(0, 5);
                            bookedTimes[t] = b.status;
                        });
                    } else {
                        console.error('获取已预约时段失败:', resp.status, resp.statusText);
                    }
                } catch (e) {
                    console.error('获取已预约时段异常:', e);
                }

                var slots = genSlots(window._timeStart, window._timeEnd, 60);

                var html = '';
                slots.forEach(function(slot) {
                    var isBooked = slot.time in bookedTimes;
                    var cls = isBooked ? 'slot-btn booked' : 'slot-btn';
                    html += '<button type="button" class="' + cls + '" data-time="' + slot.time + '"'
                         + (isBooked ? ' disabled' : '')
                         + '>' + slot.label + '</button>';
                });

                if (slots.length === 0) {
                    html = '<p class="slot-hint">该日期不坐诊</p>';
                }

                grid.innerHTML = html;

                // 绑定点击事件
                grid.querySelectorAll('.slot-btn:not(.booked)').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        grid.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('selected'); });
                        btn.classList.add('selected');
                        timeInput.value = btn.dataset.time;
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确认预约 ' + btn.dataset.time;
                    });
                });

                timeInput.value = '';
                submitBtn.disabled = true;
                submitBtn.textContent = '请先选择时段';

            } catch (err) {
                grid.innerHTML = '<p class="slot-hint" style="color:#c62828;">加载时段失败，请重试</p>';
            }
        }

        var path = window.location.pathname;
        if (path === '/' || path === '') document.querySelector('.nav-home')?.classList.add('active');
        else if (path.startsWith('/departments') || path.startsWith('/doctors') || path.startsWith('/doctor')) document.querySelector('.nav-depts')?.classList.add('active');
        else if (path.startsWith('/appointment') || path.startsWith('/appointments')) document.querySelector('.nav-appts')?.classList.add('active');
        else if (path.startsWith('/patient/records')) document.querySelector('.nav-records')?.classList.add('active');
        else if (path.startsWith('/profile')) document.querySelector('.nav-profile')?.classList.add('active');
    </script>
</body>
</html>
