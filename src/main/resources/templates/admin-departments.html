<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室管理 - 医院管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; }
        .nav a:hover { text-decoration: underline; }
        .content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        .btn { display: inline-block; padding: 10px 20px; background: #C92A2A; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
        .btn:hover { background: #B02525; }
        .btn-small { padding: 6px 12px; font-size: 14px; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-primary { background: #2E86DE; }
        .btn-primary:hover { background: #1E6FCF; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        table { width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #333; }
        tr:hover { background: #f8f9fa; }
        tr.offline { background: #fff5f5; }
        tr.offline td { color: #999; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .status-on { background: #d4edda; color: #155724; }
        .status-off { background: #fce4ec; color: #c62828; }
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .pagination { margin-top: 20px; text-align: center; }
        .pagination a { padding: 8px 16px; background: white; color: #C92A2A; text-decoration: none; border-radius: 4px; margin: 0 5px; }
        .pagination a:hover { background: #C92A2A; color: white; }
        .pagination .active { background: #C92A2A; color: white; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🏥 医院管理系统 - 科室管理</div>
            <div class="nav">
                <a href="/admin/dashboard">🏠 返回首页</a>
                <a href="/logout">🚪 退出登录</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="page-title">
            <h1>科室管理</h1>
            <a href="/admin/department/add" class="btn">+ 添加科室</a>
        </div>
        
        <table th:if="${departments != null and departments.size() > 0}">
            <thead>
                <tr>
                    <th>科室名称</th>
                    <th>科室描述</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dept : ${departments}" th:classappend="${!dept.active ? 'offline' : ''}">
                    <td th:text="${dept.name}"></td>
                    <td th:text="${dept.description != null ? dept.description : '暂无描述'}"></td>
                    <td>
                        <span th:if="${dept.active}" class="status-badge status-on">上线</span>
                        <span th:unless="${dept.active}" class="status-badge status-off">下线</span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <a th:href="@{/admin/department/edit(id=${dept.id})}" class="btn btn-small btn-primary">✏️ 修改</a>
                            <a th:if="${dept.active}" th:href="@{/admin/department/offline(id=${dept.id})}" class="btn btn-small btn-danger" onclick="return confirm('下线该科室后，该科室下的所有医生也将下线，确定吗？')">下线</a>
                            <a th:unless="${dept.active}" th:href="@{/admin/department/enable(id=${dept.id})}" class="btn btn-small btn-success">启用</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="empty" th:if="${departments == null or departments.size() == 0}">
            <p>暂无科室信息</p>
        </div>
        
        <div class="pagination" th:if="${deptPage != null and deptPage.totalPages > 1}">
            <a th:if="${!deptPage.first}" th:href="@{/admin/departments(page=${deptPage.number - 1})}">上一页</a>
            <span class="active" th:text="${deptPage.number + 1}"></span>
            <a th:if="${!deptPage.last}" th:href="@{/admin/departments(page=${deptPage.number + 1})}">下一页</a>
        </div>
    </div>
</body>
</html>
