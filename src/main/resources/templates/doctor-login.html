<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生登录 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); min-height: 100vh; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: #333; }
        .logo p { color: #666; margin-top: 5px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #00b894; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; }
        .toggle-pwd { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #888; padding: 4px; }
        .toggle-pwd:hover { color: #333; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 184, 148, 0.4); }
        .error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #00b894; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .role-badge { display: inline-block; padding: 6px 16px; background: #00b894; color: white; border-radius: 20px; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>🏥 医院预约挂号系统</h1>
                <p>医生登录入口</p>
                <span class="role-badge">👨‍⚕️ 医生</span>
            </div>
            
            <div th:if="${error != null}" class="error">
                <span>❌</span> [[${error}]]
            </div>
            
            <form action="/doctor/login" method="post">
                <div class="form-group">
                    <label for="username">医生工号 / 账号</label>
                    <input type="text" id="username" name="username" placeholder="请输入医生账号" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        <button type="button" class="toggle-pwd" onclick="togglePassword()">👁</button>
                    </div>
                </div>
                
                <button type="submit" class="btn">医生登录</button>
            </form>
            
            <div class="back-link">
                <a href="/">← 返回首页</a>
            </div>
        </div>
    </div>
    <script>
        function togglePassword() {
            var pwd = document.getElementById('password');
            var btn = document.querySelector('.toggle-pwd');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁';
            }
        }
    </script>
</body>
</html>
