<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知 - 医生工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f7f4; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); color: white; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .header h1 { font-size: 20px; }
        .header-right a { color: white; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; }
        .header-right a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 24px; }
        .breadcrumb { color: #666; font-size: 14px; margin-bottom: 16px; }
        .breadcrumb a { color: #00b894; text-decoration: none; }
        .content { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .alert-info { background: #e0f7fa; border-left: 4px solid #00bcd4; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .alert-success { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .alert-warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
        .msg-header { font-weight: bold; margin-bottom: 6px; }
        .msg-body { color: #666; font-size: 14px; }
        .msg-time { color: #999; font-size: 12px; margin-top: 6px; }
        .reminder-list { margin-top: 16px; }
        .reminder-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #fafafa; border-radius: 8px; margin-bottom: 8px; }
        .reminder-icon { font-size: 24px; }
        .reminder-text h4 { color: #333; font-size: 15px; }
        .reminder-text p { color: #888; font-size: 13px; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>👨‍⚕️ 医生工作台</h1>
            <div class="header-right">
                <a href="/doctor/dashboard">📊 仪表板</a>
                <a href="/logout">🚪 退出</a>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="breadcrumb"><a href="/doctor/dashboard">← 返回仪表板</a></div>
        <div class="content">
            <h2 style="margin-bottom:20px;">🔔 消息通知中心</h2>
            <div class="alert-info">
                <div class="msg-header">📢 系统公告</div>
                <div class="msg-body">欢迎使用医院预约挂号管理系统，请及时查看患者预约信息，合理安排诊疗时间。</div>
                <div class="msg-time">2026-05-11 08:00</div>
            </div>
            <div class="alert-warning">
                <div class="msg-header">⚠️ 预约提醒</div>
                <div class="msg-body">您今天有 <strong th:text="${newPatientCount}">0</strong> 位新预约患者待就诊，请做好准备。</div>
                <div class="msg-time" th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm')}"></div>
            </div>
            <div class="alert-success">
                <div class="msg-header">✅ 操作提醒</div>
                <div class="msg-body">请在完成诊疗后及时更新诊疗记录和患者状态，确保系统数据准确。</div>
                <div class="msg-time">2026-05-11 08:00</div>
            </div>
            <h3 style="margin-top:24px;margin-bottom:12px;">📅 今日预约提醒</h3>
            <div class="reminder-list">
                <div th:if="${!#lists.isEmpty(todayAppointments)}">
                    <div th:each="appt : ${todayAppointments}" class="reminder-item">
                        <div class="reminder-icon">👤</div>
                        <div class="reminder-text">
                            <h4 th:text="${appt.patientName}"></h4>
                            <p th:text="'预约时间：' + ${appt.appointmentTime} + ' | 状态：' + ${appt.status}"></p>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(todayAppointments)}" style="color:#999;text-align:center;padding:20px;">今天暂无预约提醒</div>
            </div>
        </div>
    </div>
</body>
</html>
