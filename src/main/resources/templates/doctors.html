<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生列表 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f5f5f5; }
        .header { background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; padding: 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .nav a { color: white; margin-left: 5px; text-decoration: none; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .nav a.active { background: rgba(255,255,255,0.25); font-weight: bold; }
        .user-greeting { color: rgba(255,255,255,0.9); margin-right: 10px; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .content { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 28px; }
        .page-title p { color: #666; margin-top: 8px; }
        .back-btn { display: inline-block; padding: 8px 20px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; margin-bottom: 20px; }
        .back-btn:hover { background: #ddd; }
        .doctors-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .doctor-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: flex; gap: 20px; }
        .doctor-avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; }
        .doctor-info { flex: 1; }
        .doctor-info h3 { color: #333; margin-bottom: 5px; }
        .doctor-title { color: #2E86DE; font-size: 14px; margin-bottom: 10px; }
        .doctor-desc { color: #666; font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .doctor-time { color: #888; font-size: 13px; }
        .btn-appoint { display: inline-block; margin-top: 10px; padding: 8px 20px; background: #2E86DE; color: white; text-decoration: none; border-radius: 20px; font-size: 14px; }
        .btn-appoint:hover { background: #1E6FCF; }
        .footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🏥 医院预约挂号系统</div>
            <div class="nav">
                <a href="/" class="nav-home">首页</a>
                <a href="/departments" class="nav-depts">科室导航</a>
                <a href="/appointments" class="nav-appts">我的预约</a>
                <a href="/patient/records" class="nav-records">诊疗记录</a>
                <a href="/profile" class="nav-profile">个人中心</a>
                <span class="user-greeting">👤 [[${user.name}]]</span>
                <a href="/logout">退出</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <a href="/departments" class="back-btn">← 返回科室列表</a>
        
        <div class="page-title">
            <h1>[[${department.name}]]</h1>
            <p>以下是该科室的医生信息</p>
        </div>
        
        <div class="doctors-list">
            <div class="doctor-card" th:each="doctor : ${doctors}">
                <div class="doctor-avatar">👨⚕️</div>
                <div class="doctor-info">
                    <h3>[[${doctor.name}]]</h3>
                    <div class="doctor-title">[[${doctor.title}]]</div>
                    <div class="doctor-desc" th:if="${doctor.description != null}">[[${doctor.description}]]</div>
                    <div class="doctor-time">坐诊时间：[[${doctor.availableTime}]]</div>
                    <a th:href="@{/appointment/create(doctorId=${doctor.id})}" class="btn-appoint">立即预约</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2024 医院预约挂号系统 版权所有</p>
    </div>

    <script>
        var path = window.location.pathname;
        if (path === '/' || path === '') document.querySelector('.nav-home')?.classList.add('active');
        else if (path.startsWith('/departments') || path.startsWith('/doctors') || path.startsWith('/doctor')) document.querySelector('.nav-depts')?.classList.add('active');
        else if (path.startsWith('/appointment') || path.startsWith('/appointments')) document.querySelector('.nav-appts')?.classList.add('active');
        else if (path.startsWith('/patient/records')) document.querySelector('.nav-records')?.classList.add('active');
        else if (path.startsWith('/profile')) document.querySelector('.nav-profile')?.classList.add('active');
    </script>
</body>
</html>
