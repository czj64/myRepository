<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-container { background: white; padding: 60px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; max-width: 500px; }
        .error-icon { font-size: 80px; margin-bottom: 20px; }
        .error-code { font-size: 48px; color: #e53935; font-weight: bold; margin-bottom: 10px; }
        .error-message { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 36px; background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; text-decoration: none; border-radius: 30px; font-size: 16px; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(46, 134, 222, 0.4); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code" th:text="${errorCode}">ERROR</div>
        <div class="error-message" th:text="${errorMessage}">发生错误</div>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
