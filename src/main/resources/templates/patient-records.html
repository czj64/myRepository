<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊疗记录 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f5f5f5; }
        .header { background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; padding: 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .nav a { color: white; margin-left: 5px; text-decoration: none; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .nav a.active { background: rgba(255,255,255,0.25); font-weight: bold; }
        .user-greeting { color: rgba(255,255,255,0.9); margin-right: 10px; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .content { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 40px; }
        .page-title h1 { color: #333; font-size: 32px; }
        .page-title p { color: #666; margin-top: 10px; }
        .record-list { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .record-item { border-bottom: 1px solid #eee; padding: 20px 0; }
        .record-item:last-child { border-bottom: none; }
        .record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .doctor-info h3 { color: #333; margin-bottom: 5px; }
        .doctor-info p { color: #666; font-size: 14px; }
        .status { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .status-completed { background: #e8f5e9; color: #4caf50; }
        .record-detail { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-top: 12px; }
        .record-detail .diag-item { margin-bottom: 12px; }
        .record-detail .diag-item:last-child { margin-bottom: 0; }
        .record-detail .diag-label { font-size: 13px; color: #888; margin-bottom: 4px; }
        .record-detail .diag-value { font-size: 15px; color: #333; font-weight: 500; }
        .record-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e0e0e0; }
        .record-meta .meta-item label { display: block; color: #888; font-size: 13px; }
        .record-meta .meta-item span { color: #333; font-weight: 500; font-size: 14px; }
        .no-diag { color: #999; font-style: italic; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 64px; margin-bottom: 20px; }
        .empty-state h3 { color: #666; margin-bottom: 10px; }
        .btn-appoint { display: inline-block; padding: 10px 24px; background: #2E86DE; color: white; text-decoration: none; border-radius: 20px; }
        .btn-appoint:hover { background: #1E6FCF; }
        .footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🏥 医院预约挂号系统</div>
            <div class="nav">
                <a href="/" class="nav-home">首页</a>
                <a href="/departments" class="nav-depts">科室导航</a>
                <a href="/appointments" class="nav-appts">我的预约</a>
                <a href="/patient/records" class="nav-records">诊疗记录</a>
                <a href="/profile" class="nav-profile">个人中心</a>
                <span class="user-greeting">👤 [[${user.name}]]</span>
                <a href="/logout">退出</a>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="page-title">
            <h1>📋 诊疗记录</h1>
            <p>查看您的所有诊疗结果</p>
        </div>

        <div class="record-list" th:if="${records != null and records.size() > 0}">
            <div class="record-item" th:each="r : ${records}">
                <div class="record-header">
                    <div class="doctor-info">
                        <h3>[[${r.doctor.name}]] - [[${r.doctor.title}]]</h3>
                        <p>[[${r.doctor.department.name}]]</p>
                    </div>
                    <span class="status" th:classappend="${r.status == '已完成' ? 'status-completed' : ''}">
                        [[${r.status}]]
                    </span>
                </div>

                <div th:if="${r.status != '已完成'}" class="record-detail" style="text-align:center;color:#999;">
                    <span th:if="${r.status == '已取消'}">❌ 预约已取消</span>
                    <span th:if="${r.status == '待就诊' or r.status == '已确认'}">⏳ 等待医生诊断</span>
                </div>

                <div class="record-meta">
                    <div class="meta-item">
                        <label>预约日期</label>
                        <span>[[${r.appointmentDate}]]</span>
                    </div>
                    <div class="meta-item">
                        <label>预约时间</label>
                        <span>[[${r.appointmentTime}]]</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${records == null or records.size() == 0}">
            <div class="icon">📋</div>
            <h3>暂无记录</h3>
            <p>您还没有任何诊疗记录</p>
            <a href="/departments" class="btn-appoint">立即预约</a>
        </div>
    </div>

    <div class="footer">
        <p>© 2024 医院预约挂号系统 版权所有</p>
    </div>

    <script>
        var path = window.location.pathname;
        if (path === '/' || path === '') document.querySelector('.nav-home')?.classList.add('active');
        else if (path.startsWith('/departments') || path.startsWith('/doctors') || path.startsWith('/doctor')) document.querySelector('.nav-depts')?.classList.add('active');
        else if (path.startsWith('/appointment') || path.startsWith('/appointments')) document.querySelector('.nav-appts')?.classList.add('active');
        else if (path.startsWith('/patient/records')) document.querySelector('.nav-records')?.classList.add('active');
        else if (path.startsWith('/profile')) document.querySelector('.nav-profile')?.classList.add('active');
    </script>
</body>
</html>
