<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${department != null ? '修改科室' : '添加科室'}">科室管理 - 医院管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; display: inline-block; }
        
        .content { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-card h2 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #C92A2A; }
        .form-actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn { padding: 12px 30px; background: #C92A2A; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-decoration: none; display: inline-block; }
        .btn:hover { background: #B02525; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo" th:text="${department != null ? '🏥 医院管理系统 - 修改科室' : '🏥 医院管理系统 - 添加科室'}">🏥 医院管理系统</div>
            <div class="nav">
                <a href="/admin/dashboard">📊 仪表板</a>
                <a href="/admin/departments">🏥 科室管理</a>
                <a href="/admin/doctors">👨‍⚕️ 医生管理</a>
                <a href="/admin/appointments">📅 预约管理</a>
                <a href="/admin/users">👥 用户管理</a>
                <a href="/admin/reviews">📝 评价管理</a>
                <a href="/admin/statistics">📈 统计</a>
                <a href="/logout">🚪 退出</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="form-card">
            <h2 th:text="${department != null ? '修改科室' : '添加新科室'}">科室信息</h2>
            <form th:action="${department != null ? '/admin/department/update' : '/admin/department/save'}" method="post">
                <input type="hidden" name="id" th:if="${department != null}" th:value="${department.id}">
                <div class="form-group">
                    <label for="name">科室名称 *</label>
                    <input type="text" id="name" name="name" th:value="${department != null ? department.name : ''}" required placeholder="例如：内科">
                </div>
                
                <div class="form-group">
                    <label for="description">科室描述</label>
                    <textarea id="description" name="description" placeholder="请输入科室描述（可选）" th:text="${department != null ? department.description : ''}"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn" th:text="${department != null ? '保存修改' : '保存'}">保存</button>
                    <a href="/admin/departments" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
