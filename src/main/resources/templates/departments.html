<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科室导航 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #f5f5f5; }
        .header { background: linear-gradient(135deg, #2E86DE 0%, #1E3A5F 100%); color: white; padding: 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .nav a { color: white; margin-left: 5px; text-decoration: none; padding: 8px 16px; border-radius: 4px; transition: background 0.3s; }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .nav a.active { background: rgba(255,255,255,0.25); font-weight: bold; }
        .user-greeting { color: rgba(255,255,255,0.9); margin-right: 10px; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .content { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 32px; }
        .page-title p { color: #666; margin-top: 10px; }
        .search-box { max-width: 500px; margin: 0 auto 30px; display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 16px; outline: none; }
        .search-box input:focus { border-color: #2E86DE; }
        .search-box button { padding: 12px 28px; background: #2E86DE; color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; }
        .search-box button:hover { background: #1E6FCF; }
        .departments-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .dept-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); transition: all 0.3s; cursor: pointer; }
        .dept-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .dept-icon { font-size: 48px; margin-bottom: 15px; }
        .dept-card h3 { color: #333; margin-bottom: 10px; }
        .dept-card p { color: #666; font-size: 14px; line-height: 1.6; }
        .btn-view { display: inline-block; margin-top: 15px; padding: 8px 20px; background: #2E86DE; color: white; text-decoration: none; border-radius: 20px; font-size: 14px; }
        .btn-view:hover { background: #1E6FCF; }
        .footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🏥 医院预约挂号系统</div>
            <div class="nav">
                <a href="/" class="nav-home">首页</a>
                <a href="/departments" class="nav-depts">科室导航</a>
                <a href="/appointments" class="nav-appts">我的预约</a>
                <a href="/profile" class="nav-profile">个人中心</a>
                <span class="user-greeting">👤 [[${user.name}]]</span>
                <a href="/logout">退出</a>
            </div>
        </div>
        
        <div th:if="${departments.size() == 0}" style="text-align:center;padding:60px 20px;color:#999;">
            <p th:if="${keyword != null and keyword != ''}">没有找到包含"[[${keyword}]]"的科室</p>
            <p th:unless="${keyword != null and keyword != ''}">暂无可用科室</p>
        </div>
    </div>
    
    <div class="content">
        <div class="page-title">
            <h1>科室导航</h1>
            <p>请选择您需要就诊的科室</p>
        </div>
        
        <form class="search-box" action="/departments" method="get">
            <input type="text" name="keyword" placeholder="搜索科室名称..." th:value="${keyword}">
            <button type="submit">🔍 搜索</button>
        </form>
        
        <div class="departments-grid" th:if="${departments.size() > 0}">
            <div class="dept-card" th:each="dept : ${departments}">
                <div class="dept-icon" th:text="${dept.name == '内科' ? '🫁' : dept.name == '外科' ? '🔪' : dept.name == '妇产科' ? '👶' : dept.name == '儿科' ? '🧒' : dept.name == '骨科' ? '🦴' : dept.name == '眼科' ? '👁️' : dept.name == '耳鼻喉科' ? '👂' : dept.name == '皮肤科' ? '🧴' : dept.name == '口腔科' ? '🦷' : '🏥'}"></div>
                <h3>[[${dept.name}]]</h3>
                <p th:if="${dept.description != null}">[[${dept.description}]]</p>
                <a th:href="@{/doctors(departmentId=${dept.id})}" class="btn-view">查看医生 →</a>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2024 医院预约挂号系统 版权所有</p>
    </div>

    <script>
        var path = window.location.pathname;
        if (path === '/' || path === '') document.querySelector('.nav-home')?.classList.add('active');
        else if (path.startsWith('/departments') || path.startsWith('/doctors') || path.startsWith('/doctor')) document.querySelector('.nav-depts')?.classList.add('active');
        else if (path.startsWith('/appointment') || path.startsWith('/appointments')) document.querySelector('.nav-appts')?.classList.add('active');
        else if (path.startsWith('/profile')) document.querySelector('.nav-profile')?.classList.add('active');
    </script>
</body>
</html>
