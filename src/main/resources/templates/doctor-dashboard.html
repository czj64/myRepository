<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生工作台 - 医院预约挂号系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f7f4; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #00b894 0%, #00cec9 100%); color: white; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .header h1 { font-size: 20px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-right a { color: white; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: background 0.3s; }
        .header-right a:hover { background: rgba(255,255,255,0.2); }
        .user-info { font-size: 14px; opacity: 0.9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .welcome { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .welcome h2 { color: #333; font-size: 22px; }
        .welcome p { color: #666; margin-top: 6px; }
        .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .stat-num { font-size: 32px; font-weight: bold; color: #00b894; }
        .stat-card .stat-label { color: #666; margin-top: 4px; font-size: 14px; }
        .modules { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .module-card { background: white; padding: 28px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; cursor: pointer; transition: all 0.3s; text-decoration: none; color: #333; }
        .module-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,184,148,0.2); }
        .module-icon { font-size: 40px; margin-bottom: 12px; }
        .module-card h3 { font-size: 18px; margin-bottom: 6px; }
        .module-card p { color: #888; font-size: 13px; }
        .today-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 20px; }
        .today-section h3 { font-size: 18px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #00b894; }
        .patient-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .patient-row:last-child { border-bottom: none; }
        .patient-info { display: flex; align-items: center; gap: 12px; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #fce4ec; color: #c62828; }
        .empty-state { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <h1>👨‍⚕️ 医生工作台</h1>
            <div class="header-right">
                <span class="user-info" th:text="${doctor.name} + ' - ' + ${doctor.title}"></span>
                <a href="/doctor/profile">👤 个人设置</a>
                <a href="/logout">🚪 退出登录</a>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="welcome">
            <h2>欢迎回来，<span th:text="${doctor.name}"></span>！</h2>
            <p>今天是 <span th:text="${#temporals.format(todayDate, 'yyyy年MM月dd日')}"></span>，祝您工作顺利！</p>
        </div>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-num" th:text="${pendingCount}">0</div>
                <div class="stat-label">今日待就诊</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" th:text="${#lists.size(todayAppointments)}">0</div>
                <div class="stat-label">今日预约总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" th:text="${totalPending}">0</div>
                <div class="stat-label">待就诊总数(全部)</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" th:text="${completedCount}">0</div>
                <div class="stat-label">累计已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" th:text="${doctor.department.name}">-</div>
                <div style="font-size:18px;font-weight:bold;color:#00b894;margin-top:4px;" class="stat-label">所属科室</div>
            </div>
        </div>
        <div class="modules">
            <a href="/doctor/patients" class="module-card">
                <div class="module-icon">👥</div>
                <h3>患者管理</h3>
                <p>查看待诊患者及历史记录</p>
            </a>
            <a href="/doctor/records" class="module-card">
                <div class="module-icon">📋</div>
                <h3>诊疗记录</h3>
                <p>创建、编辑、查看诊疗信息</p>
            </a>
            <a href="/doctor/schedule" class="module-card">
                <div class="module-icon">📅</div>
                <h3>日程安排</h3>
                <p>查看出诊时间与排班</p>
            </a>
            <a href="/doctor/messages" class="module-card">
                <div class="module-icon">🔔</div>
                <h3>消息通知</h3>
                <p>系统公告与预约提醒</p>
            </a>
            <a href="/doctor/profile" class="module-card">
                <div class="module-icon">⚙️</div>
                <h3>个人信息</h3>
                <p>修改密码与联系方式</p>
            </a>
        </div>
        <div class="today-section" th:if="${!#lists.isEmpty(todayAppointments)}">
            <h3>📋 今日预约患者 (<span th:text="${#lists.size(todayAppointments)}"></span>人)</h3>
            <div th:each="appt : ${todayAppointments}" class="patient-row">
                <div class="patient-info">
                    <strong th:text="${appt.patientName}"></strong>
                    <span th:text="${appt.appointmentTime}"></span>
                </div>
                <div>
                    <span th:if="${appt.status == '待就诊'}" class="status-badge status-pending">待就诊</span>
                    <span th:if="${appt.status == '已完成'}" class="status-badge status-completed">已完成</span>
                    <span th:if="${appt.status == '已确认'}" class="status-badge" style="background:#cce5ff;color:#004085;">已确认</span>
                    <span th:if="${appt.status == '已取消'}" class="status-badge status-cancelled">患者已取消 ⚠️</span>
                </div>
            </div>
        </div>
        <div class="today-section" th:if="${#lists.isEmpty(todayAppointments)}">
            <h3>📋 今日预约患者</h3>
            <div class="empty-state">🎉 今天暂无预约患者</div>
        </div>
    </div>
</body>
</html>
