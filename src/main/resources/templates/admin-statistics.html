<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 医院管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; }
        .content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .stat-card .icon { font-size: 36px; margin-bottom: 10px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #C92A2A; margin: 10px 0; }
        .stat-card .label { color: #666; font-size: 14px; }
        .chart-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .chart-container h2 { color: #333; margin-bottom: 20px; font-size: 20px; }
        .chart { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">📊 医院管理系统 - 数据统计</div>
            <div class="nav">
                <a href="/admin/dashboard">🏠 返回首页</a>
                <a href="/logout">🚪 退出登录</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="page-title">
            <h1>数据统计</h1>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">👨‍️</div>
                <div class="number" th:text="${doctorCount}">0</div>
                <div class="label">医生总数</div>
            </div>
            <div class="stat-card">
                <div class="icon">🏥</div>
                <div class="number" th:text="${departmentCount}">0</div>
                <div class="label">科室数量</div>
            </div>
            <div class="stat-card">
                <div class="icon">📅</div>
                <div class="number" th:text="${appointmentCount}">0</div>
                <div class="label">预约总数</div>
            </div>
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" th:text="${patientCount}">0</div>
                <div class="label">患者总数</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2>今日预约情况</h2>
            <div id="todayChart" class="chart"></div>
        </div>
        
        <div class="chart-container">
            <h2>预约状态分布</h2>
            <div id="statusChart" class="chart"></div>
        </div>
    </div>
    
    <script th:inline="javascript">
        // 今日预约图表
        var todayChart = echarts.init(document.getElementById('todayChart'));
        var todayPending = [[${todayPending != null ? todayPending : 0}]];
        var todayCompleted = [[${todayCompleted != null ? todayCompleted : 0}]];
        var todayCancelled = [[${todayCancelled != null ? todayCancelled : 0}]];
        var todayOption = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: { type: 'category', data: ['待就诊', '已完成', '已取消'], axisLabel: { fontSize: 14 } },
            yAxis: { type: 'value', minInterval: 1, axisLabel: { fontSize: 14 } },
            series: [{
                type: 'bar',
                barWidth: '45%',
                itemStyle: { borderRadius: [6, 6, 0, 0] },
                data: [
                    { value: todayPending, itemStyle: { color: '#f39c12' } },
                    { value: todayCompleted, itemStyle: { color: '#00b894' } },
                    { value: todayCancelled, itemStyle: { color: '#e74c3c' } }
                ]
            }],
            grid: { left: '10%', right: '10%', bottom: '15%', top: '10%' }
        };
        todayChart.setOption(todayOption);
        
        // 预约状态分布图表（真实数据）
        var statusChart = echarts.init(document.getElementById('statusChart'));
        var pendingCount = [[${pendingCount != null ? pendingCount : 0}]];
        var completedCount = [[${completedCount != null ? completedCount : 0}]];
        var cancelledCount = [[${cancelledCount != null ? cancelledCount : 0}]];
        var statusOption = {
            tooltip: {
                trigger: 'item',
                formatter: '{b}: {c} ({d}%)'
            },
            legend: {
                orient: 'vertical',
                right: '10%',
                top: 'center'
            },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    formatter: '{b}: {c}'
                },
                data: [
                    { value: pendingCount, name: '待就诊', itemStyle: { color: '#ffc107' } },
                    { value: completedCount, name: '已完成', itemStyle: { color: '#28a745' } },
                    { value: cancelledCount, name: '已取消', itemStyle: { color: '#dc3545' } }
                ]
            }],
            grid: {
                left: '5%',
                right: '25%',
                bottom: '5%',
                top: '5%'
            }
        };
        statusChart.setOption(statusOption);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            todayChart.resize();
            statusChart.resize();
        });
    </script>
</body>
</html>
