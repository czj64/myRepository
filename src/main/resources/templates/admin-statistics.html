<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 医院管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; display: inline-block; }
        .nav a:hover { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 4px; margin-left: 18px; }
        
        .content { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        .page-title p { color: #888; font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .icon { font-size: 36px; margin-bottom: 8px; }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #C92A2A; margin: 8px 0; }
        .stat-card .label { color: #666; font-size: 14px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-container { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .chart-container h2 { color: #333; margin-bottom: 20px; font-size: 18px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .chart { width: 100%; height: 400px; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">📊 医院管理系统 - 数据统计</div>
            <div class="nav">
                <a href="/admin/dashboard">📊 仪表板</a>
                <a href="/admin/departments">🏥 科室管理</a>
                <a href="/admin/doctors">👨‍⚕️ 医生管理</a>
                <a href="/admin/appointments">📅 预约管理</a>
                <a href="/admin/users">👥 用户管理</a>
                <a href="/admin/reviews">📝 评价管理</a>
                <a href="/admin/statistics">📈 统计</a>
                <a href="/logout">🚪 退出</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="page-title">
            <h1>数据统计</h1>
            <p>患者评价统计、科室预约分布、医生评分排行</p>
        </div>
        
        <!-- 评价概览统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">📝</div>
                <div class="number" th:text="${totalReviews}">0</div>
                <div class="label">总评价数</div>
            </div>
            <div class="stat-card">
                <div class="icon">⭐</div>
                <div class="number" th:text="${#numbers.formatDecimal(avgRating, 1, 1)}">0.0</div>
                <div class="label">平均评分</div>
            </div>
            <div class="stat-card">
                <div class="icon">🌟</div>
                <div class="number" th:text="${fiveStarCount}">0</div>
                <div class="label">5星好评数</div>
            </div>
            <div class="stat-card">
                <div class="icon">📈</div>
                <div class="number" th:text="${#numbers.formatDecimal(positiveRate, 1, 1)} + '%'">0%</div>
                <div class="label">好评率（4-5星）</div>
            </div>
        </div>
        
        <div class="chart-row">
            <!-- 评分分布饼图 -->
            <div class="chart-container">
                <h2>评分分布</h2>
                <div id="ratingDistChart" class="chart"></div>
            </div>
            
            <!-- 各科室预约量排行 -->
            <div class="chart-container">
                <h2>各科室预约量排行</h2>
                <div id="deptApptChart" class="chart"></div>
            </div>
        </div>
        
        <!-- 医生评分排行 -->
        <div class="chart-container full-width">
            <h2>医生评分排行 TOP10</h2>
            <div id="doctorRatingChart" class="chart"></div>
        </div>
    </div>
    
    <script th:inline="javascript">
        // 1. 评分分布饼图
        var ratingDistChart = echarts.init(document.getElementById('ratingDistChart'));
        var ratingDistOption = {
            tooltip: { trigger: 'item', formatter: '{b}: {c} 条 ({d}%)' },
            legend: { orient: 'vertical', right: '5%', top: 'center' },
            series: [{
                type: 'pie',
                radius: ['45%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                label: { show: true, formatter: '{b}: {c}' },
                data: [
                    { value: [[${fiveStarCount}]], name: '5 星', itemStyle: { color: '#f1c40f' } },
                    { value: [[${fourStarCount}]], name: '4 星', itemStyle: { color: '#2ecc71' } },
                    { value: [[${threeStarCount}]], name: '3 星', itemStyle: { color: '#3498db' } },
                    { value: [[${twoStarCount}]], name: '2 星', itemStyle: { color: '#e67e22' } },
                    { value: [[${oneStarCount}]], name: '1 星', itemStyle: { color: '#e74c3c' } }
                ]
            }]
        };
        ratingDistChart.setOption(ratingDistOption);
        
        // 2. 各科室预约量排行
        var deptApptChart = echarts.init(document.getElementById('deptApptChart'));
        var deptNames = [[${deptApptNames}]];
        var deptCounts = [[${deptApptCounts}]];
        // 从高到低排序
        if (deptNames && deptNames.length > 0) {
            var paired = deptNames.map(function(name, i) { return { name: name, count: deptCounts[i] }; });
            paired.sort(function(a, b) { return b.count - a.count; });
            deptNames = paired.map(function(p) { return p.name; });
            deptCounts = paired.map(function(p) { return p.count; });
        }
        var deptOption = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '8%', bottom: '10%', top: '5%', containLabel: true },
            xAxis: { type: 'value', minInterval: 1, axisLabel: { fontSize: 13 } },
            yAxis: { type: 'category', data: deptNames, axisLabel: { fontSize: 13 } },
            series: [{
                type: 'bar',
                barWidth: '50%',
                itemStyle: { borderRadius: [0, 6, 6, 0], color: {
                    type: 'linear', x: 0, y: 0, x2: 1, y2: 0,
                    colorStops: [
                        { offset: 0, color: '#FF6B6B' },
                        { offset: 1, color: '#C92A2A' }
                    ]
                }},
                data: deptCounts
            }]
        };
        deptApptChart.setOption(deptOption);
        
        // 3. 医生评分排行
        var doctorRatingChart = echarts.init(document.getElementById('doctorRatingChart'));
        var doctorList = [[${doctorRatingList}]];
        var docNames = doctorList ? doctorList.map(function(d) { return d.name + ' (' + d.dept + ')'; }).reverse() : [];
        var docRatings = doctorList ? doctorList.map(function(d) { return d.rating; }).reverse() : [];
        
        var docOption = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(params) { return params[0].name + '<br/>评分: ⭐ ' + params[0].value.toFixed(1); } },
            grid: { left: '3%', right: '8%', bottom: '5%', top: '5%', containLabel: true },
            xAxis: { type: 'value', min: 0, max: 5, axisLabel: { fontSize: 13, formatter: '{value} 星' } },
            yAxis: { type: 'category', data: docNames, axisLabel: { fontSize: 13 } },
            series: [{
                type: 'bar',
                barWidth: '45%',
                itemStyle: { borderRadius: [0, 6, 6, 0] },
                data: docRatings.map(function(v) {
                    var color = v >= 4.5 ? '#f1c40f' : (v >= 4 ? '#2ecc71' : (v >= 3 ? '#3498db' : '#e74c3c'));
                    return { value: v, itemStyle: { color: color } };
                })
            }]
        };
        doctorRatingChart.setOption(docOption);
        
        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            ratingDistChart.resize();
            deptApptChart.resize();
            doctorRatingChart.resize();
        });
    </script>
</body>
</html>
