<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约管理 - 医院管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; display: inline-block; }
        .content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .page-title { margin-bottom: 30px; }
        .page-title h1 { color: #333; font-size: 28px; margin-bottom: 10px; }
        .filter-bar { margin-bottom: 20px; display: flex; gap: 10px; }
        .filter-btn { padding: 8px 20px; border: 1px solid #ddd; border-radius: 20px; text-decoration: none; color: #555; font-size: 14px; }
        .filter-btn:hover { background: #f0f0f0; }
        .filter-btn.active { background: #FF6B6B; color: white; border-color: #FF6B6B; }
        .search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-bar input { flex: 1; max-width: 350px; padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 20px; font-size: 14px; outline: none; }
        .search-bar input:focus { border-color: #FF6B6B; }
        .search-bar button { padding: 10px 20px; background: #FF6B6B; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .search-bar button:hover { background: #C92A2A; }
        table { width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #333; }
        tr:hover { background: #f8f9fa; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .status-expired { background: #e2e3e5; color: #383d41; }
        .action-btns { display: flex; gap: 8px; }
        .btn-small { padding: 4px 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-confirm { background: #17a2b8; color: white; }
        .btn-complete { background: #28a745; color: white; }
        .btn-cancel { background: #dc3545; color: white; }
        .pagination { margin-top: 20px; text-align: center; }
        .pagination a { padding: 8px 16px; background: white; color: #C92A2A; text-decoration: none; border-radius: 4px; margin: 0 5px; }
        .pagination a:hover { background: #C92A2A; color: white; }
        .pagination .active { background: #C92A2A; color: white; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">📅 医院管理系统 - 预约管理</div>
            <div class="nav">
                <a href="/admin/dashboard">📊 仪表板</a>
                <a href="/admin/departments">🏥 科室管理</a>
                <a href="/admin/doctors">👨‍⚕️ 医生管理</a>
                <a href="/admin/appointments">📅 预约管理</a>
                <a href="/admin/users">👥 用户管理</a>
                
                <a href="/admin/reviews">📝 评价管理</a>
                <a href="/admin/statistics">📈 统计</a>
                <a href="/logout">🚪 退出</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="page-title">
            <h1>预约管理</h1>
        </div>
        
        <div class="filter-bar">
            <a href="/admin/appointments" class="filter-btn" th:classappend="${currentStatus == null ? 'active' : ''}">全部</a>
            <a href="/admin/appointments?status=待就诊" class="filter-btn" th:classappend="${currentStatus == '待就诊' ? 'active' : ''}">待就诊</a>
            <a href="/admin/appointments?status=已完成" class="filter-btn" th:classappend="${currentStatus == '已完成' ? 'active' : ''}">已完成</a>
            <a href="/admin/appointments?status=已取消" class="filter-btn" th:classappend="${currentStatus == '已取消' ? 'active' : ''}">已取消</a>
        </div>
        
        <form class="search-bar" action="/admin/appointments" method="get">
            <input type="text" name="keyword" placeholder="搜索患者姓名..." th:value="${keyword}">
            <input type="hidden" name="status" th:value="${currentStatus}" th:if="${currentStatus != null}">
            <button type="submit">🔍 搜索</button>
        </form>
        
        <table th:if="${appointments != null and appointments.size() > 0}">
            <thead>
                <tr>
                    <th>患者姓名</th>
                    <th>医生</th>
                    <th>科室</th>
                    <th>预约日期</th>
                    <th>预约时间</th>
                    <th>状态</th>
                    <th>联系电话</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="appointment : ${appointments}">
                    <td th:text="${appointment.patientName}"></td>
                    <td th:text="${appointment.doctor.name}"></td>
                    <td th:text="${appointment.doctor.department.name}"></td>
                    <td th:text="${appointment.appointmentDate}"></td>
                    <td th:text="${appointment.appointmentTime}"></td>
                    <td>
                        <span class="status-badge" th:classappend="|status-${appointment.status}|">
                            [[${appointment.status}]]
                        </span>
                    </td>
                    <td th:text="${appointment.patientPhone != null ? appointment.patientPhone : '未填写'}"></td>
                </tr>
            </tbody>
        </table>
        
        <div class="empty" th:if="${appointments == null or appointments.size() == 0}">
            <p>暂无预约记录</p>
        </div>
        
        <div class="pagination" th:if="${appointmentPage != null and appointmentPage.totalPages > 1}">
            <a th:if="${!appointmentPage.first}" th:href="@{/admin/appointments(page=${appointmentPage.number - 1}, status=${currentStatus}, keyword=${keyword})}">上一页</a>
            <span class="active" th:text="${appointmentPage.number + 1}"></span>
            <a th:if="${!appointmentPage.last}" th:href="@{/admin/appointments(page=${appointmentPage.number + 1}, status=${currentStatus}, keyword=${keyword})}">下一页</a>
        </div>
    </div>
</body>
</html>
