<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加医生 - 医院管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #C92A2A 100%); color: white; padding: 15px 0; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; }
        .content { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-card h2 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #C92A2A; }
        .form-actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn { padding: 12px 30px; background: #C92A2A; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-decoration: none; display: inline-block; }
        .btn:hover { background: #B02525; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">👨‍⚕️ 医院管理系统 - 添加医生</div>
            <div class="nav">
                <a href="/admin/dashboard">🏠 返回首页</a>
                <a href="/logout">🚪 退出登录</a>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="form-card">
            <h2>添加新医生</h2>
            
            <div th:if="${error != null}" style="color: red; margin-bottom: 20px; padding: 12px; background: #ffebee; border-radius: 4px;">
                <span>❌</span> [[${error}]]
            </div>
            
            <form action="/admin/doctor/save" method="post">
                <div class="form-group">
                    <label for="name">医生姓名 *</label>
                    <input type="text" id="name" name="name" required placeholder="请输入医生姓名">
                </div>

                <div class="form-group">
                    <label for="username">登录账号 *</label>
                    <input type="text" id="username" name="username" required placeholder="医生登录用的账号">
                </div>

                <div class="form-group">
                    <label for="password">登录密码 *</label>
                    <input type="text" id="password" name="password" required placeholder="医生登录用的密码">
                </div>
                
                <div class="form-group">
                    <label for="title">医生职称 *</label>
                    <input type="text" id="title" name="title" required placeholder="例如：主任医师">
                </div>
                
                <div class="form-group">
                    <label for="departmentId">所属科室 *</label>
                    <select id="departmentId" name="departmentId" required>
                        <option value="">请选择科室</option>
                        <option th:each="dept : ${departments}" 
                                th:value="${dept.id}" 
                                th:text="${dept.name}"></option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="availableTime">坐诊时间 *</label>
                    <input type="text" id="availableTime" name="availableTime" required placeholder="格式：周一至周五 09:00-12:00 14:00-17:30">
                    <p style="color: #888; font-size: 12px; margin-top: 5px;">请输入具体时间，如：周一至周五 09:00-12:00 或 每天 08:30-11:30 14:00-17:30</p>
                </div>
                
                <div class="form-group">
                    <label for="description">医生简介</label>
                    <textarea id="description" name="description" placeholder="请输入医生简介（可选）"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn">保存</button>
                    <a href="/admin/doctors" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
